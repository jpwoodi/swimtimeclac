<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swim Plan Generator</title>
    <link rel="icon" href="/images/swimming_favicon.ico">
    <meta name="description" content="Generate personalised AI-powered swim training plans based on your Critical Swim Speed.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/nav.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #f6f9fc;
            color: #1a1f36;
            min-height: 100vh;
            padding: 124px 0 60px;
        }

        .page-header {
            max-width: 600px;
            margin: 0 auto;
            padding: 32px 24px 0;
            text-align: center;
        }

        .page-header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #1a1f36;
        }

        .page-header p {
            color: #697386;
            font-size: 15px;
            margin-top: 4px;
        }

        .form-card {
            background: #fff;
            border: 1px solid #e3e8ee;
            border-radius: 8px;
            max-width: 600px;
            margin: 24px auto 0;
            padding: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #697386;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 6px;
        }

        input[type="text"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e3e8ee;
            border-radius: 6px;
            font-size: 15px;
            font-family: inherit;
            color: #1a1f36;
            transition: border-color 0.15s ease;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #635bff;
            box-shadow: 0 0 0 3px rgba(99, 91, 255, 0.1);
        }

        .input-row {
            display: flex;
            gap: 8px;
        }

        .input-row input { flex: 1; }

        /* Focus type chips */
        .focus-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .focus-chip input[type="checkbox"] { display: none; }

        .focus-chip span {
            display: block;
            padding: 7px 14px;
            border: 1px solid #e3e8ee;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 500;
            color: #697386;
            background: #fff;
            cursor: pointer;
            transition: all 0.15s ease;
            user-select: none;
        }

        .focus-chip span:hover { border-color: #635bff; color: #635bff; }

        .focus-chip input:checked + span {
            background: #635bff;
            border-color: #635bff;
            color: #fff;
        }

        .focus-chip input:checked + span:hover { background: #5851ea; border-color: #5851ea; }

        button {
            width: 100%;
            padding: 12px;
            background-color: #635bff;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background-color 0.15s ease;
        }

        button:hover { background-color: #5851ea; }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px 20px;
            display: none;
        }

        .spinner {
            border: 3px solid #e3e8ee;
            border-top: 3px solid #635bff;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading p {
            color: #8792a2;
            font-size: 14px;
        }

        /* Results */
        .results-card {
            background: #fff;
            border: 1px solid #e3e8ee;
            border-radius: 8px;
            max-width: 960px;
            margin: 24px auto 0;
            padding: 24px;
            display: none;
        }

        .results-card h2 {
            font-size: 16px;
            font-weight: 600;
            color: #1a1f36;
            margin-bottom: 16px;
        }

        /* Session cards */
        .sessions-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .week-heading {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #8792a2;
            padding: 12px 0 6px;
            border-bottom: 1px solid #e3e8ee;
            margin-top: 4px;
        }

        .week-heading:first-child { margin-top: 0; }

        .session-card {
            border: 1px solid #e3e8ee;
            border-radius: 8px;
            overflow: hidden;
        }

        .session-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            background: #f6f9fc;
            border-bottom: 1px solid #e3e8ee;
        }

        .session-title {
            font-size: 13px;
            font-weight: 600;
            color: #1a1f36;
        }

        .type-badge {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 100px;
            text-transform: capitalize;
        }

        .type-mileage   { background: #e8f5e9; color: #2e7d32; }
        .type-speed,
        .type-fast      { background: #fff3e0; color: #ef6c00; }
        .type-im        { background: #f3e5f5; color: #6a1b9a; }
        .type-threshold { background: #e3f2fd; color: #1565c0; }
        .type-drill,
        .type-technique { background: #e0f7fa; color: #00695c; }
        .type-default   { background: #ede7f6; color: #4527a0; }

        .session-distance {
            margin-left: auto;
            font-size: 13px;
            font-weight: 600;
            color: #635bff;
        }

        .session-body {
            display: grid;
            grid-template-columns: minmax(120px, 1fr) 2fr 3fr minmax(100px, 1fr);
        }

        .set-section {
            padding: 14px 16px;
            border-right: 1px solid #f0f3f7;
        }

        .set-section:last-child { border-right: none; }

        .set-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #8792a2;
            margin-bottom: 8px;
        }

        .set-items {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .set-items li {
            font-size: 13px;
            color: #1a1f36;
            line-height: 1.45;
            padding: 2px 0 2px 14px;
            position: relative;
        }

        .set-items li::before {
            content: '•';
            position: absolute;
            left: 0;
            color: #c3c9d4;
        }

        .set-text {
            font-size: 13px;
            color: #1a1f36;
            line-height: 1.45;
        }

        @media (max-width: 700px) {
            .session-body { grid-template-columns: 1fr; }
            .set-section { border-right: none; border-bottom: 1px solid #f0f3f7; }
            .set-section:last-child { border-bottom: none; }
        }

        .template-sources {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #e3e8ee;
            font-size: 12px;
            color: #8792a2;
        }

        .template-sources summary {
            cursor: pointer;
            font-weight: 600;
            color: #697386;
            user-select: none;
        }

        .template-sources ul {
            margin-top: 8px;
            padding-left: 16px;
            line-height: 1.8;
        }

        /* Comment section */
        .comment-section {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #e3e8ee;
            display: none;
        }

        .comment-section textarea {
            resize: vertical;
            min-height: 80px;
        }

        .comment-section button {
            margin-top: 12px;
        }

        @media (max-width: 768px) {
            .form-card, .results-card { margin: 24px 16px 0; }
            .page-header h1 { font-size: 22px; }
        }
    </style>
    <script src="/auth.js"></script>
    <script src="/components/nav.js"></script>
</head>
<body>

    <div class="page-header">
        <h1>AI Swim Plan</h1>
        <p>Generate a personalised training plan powered by AI</p>
    </div>

    <div class="form-card">
        <form id="swim-plan-form">
            <div class="form-group">
                <label>Training Focus</label>
                <div class="focus-chips">
                    <label class="focus-chip">
                        <input type="checkbox" value="mileage" checked>
                        <span>Endurance</span>
                    </label>
                    <label class="focus-chip">
                        <input type="checkbox" value="fast">
                        <span>Speed &amp; Threshold</span>
                    </label>
                    <label class="focus-chip">
                        <input type="checkbox" value="im">
                        <span>IM &amp; Strokes</span>
                    </label>
                    <label class="focus-chip">
                        <input type="checkbox" value="kitchen_sink">
                        <span>Technique &amp; Mixed</span>
                    </label>
                </div>
            </div>
            <div class="form-group">
                <label>Critical Swim Speed (per 100m)</label>
                <div class="input-row">
                    <input type="number" id="cssMinutes" name="cssMinutes" placeholder="Min" min="0">
                    <input type="number" id="cssSeconds" name="cssSeconds" placeholder="Sec" min="0" max="59">
                </div>
            </div>
            <div class="form-group">
                <label for="duration">Plan Duration (weeks)</label>
                <input type="number" id="duration" name="duration" placeholder="e.g. 4">
            </div>
            <div class="form-group">
                <label for="sessions">Sessions per Week</label>
                <input type="number" id="sessions" name="sessions" placeholder="e.g. 3">
            </div>
            <div class="form-group">
                <label for="session-duration">Session Duration (minutes)</label>
                <input type="number" id="session-duration" name="session-duration" placeholder="e.g. 60">
            </div>
            <button type="button" onclick="generateSwimPlan()">Generate Plan</button>
        </form>
    </div>

    <div id="loading-spinner" class="loading">
        <div class="spinner"></div>
        <p>Generating your plan...</p>
    </div>

    <div class="results-card" id="results-container">
        <h2>Your Swim Plan</h2>
        <div id="swim-plan-sessions"></div>

        <details class="template-sources" id="template-sources" style="display:none">
            <summary>Referenced plans</summary>
            <ul id="template-sources-list"></ul>
        </details>

        <div class="comment-section" id="comment-section">
            <div class="form-group">
                <label for="comments">Refine your plan</label>
                <textarea id="comments" name="comments" placeholder="e.g. Make the sessions longer, add more drills" rows="3"></textarea>
            </div>
            <button type="button" onclick="addComment()">Regenerate Plan</button>
        </div>
    </div>

    <script>
        let conversationHistory = [];
        let storedDetails = {};

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        async function generateSwimPlan() {
            const focusTypes = Array.from(document.querySelectorAll('.focus-chip input:checked')).map(cb => cb.value);
            const cssMinutes = document.getElementById('cssMinutes').value;
            const cssSeconds = document.getElementById('cssSeconds').value;
            const duration = document.getElementById('duration').value;
            const sessions = document.getElementById('sessions').value;
            const sessionDuration = document.getElementById('session-duration').value;

            if (focusTypes.length === 0) {
                alert("Please select at least one training focus.");
                return;
            }
            if (!cssMinutes || !cssSeconds || !duration || !sessions || !sessionDuration) {
                alert("Please fill out all fields.");
                return;
            }

            storedDetails = { focusTypes, cssMinutes, cssSeconds, duration, sessions, sessionDuration };

            await fetchAndDisplayPlan({
                ...storedDetails,
                comments: "",
                conversationHistory: []
            });

            document.getElementById('comment-section').style.display = 'block';
        }

        async function addComment() {
            const comments = document.getElementById('comments').value;
            if (!comments.trim()) {
                alert("Please enter a comment to modify the plan.");
                return;
            }

            await fetchAndDisplayPlan({
                ...storedDetails,
                conversationHistory,
                comments
            });

            document.getElementById('comments').value = '';
        }

        async function fetchAndDisplayPlan(details) {
            document.getElementById('results-container').style.display = 'none';
            document.getElementById('comment-section').style.display = 'none';
            document.getElementById('loading-spinner').style.display = 'block';

            try {
                const response = await fetch('/api/generateSwimPlan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(details)
                });

                const data = await response.json();

                if (response.ok) {
                    if (!data.sessions || data.sessions.length === 0) {
                        alert("Plan was generated but could not be parsed. Please try again.");
                        return;
                    }
                    document.getElementById('loading-spinner').style.display = 'none';
                    displaySessions(data.sessions);
                    displayTemplateSources(data.templateSources || []);
                    document.getElementById('results-container').style.display = 'block';
                    document.getElementById('comment-section').style.display = 'block';
                    conversationHistory = data.conversationHistory;
                } else {
                    console.error('Backend error:', data.error);
                    alert(`Error: ${data.error}`);
                }
            } catch (error) {
                alert(`An error occurred: ${error.message}`);
            } finally {
                document.getElementById('loading-spinner').style.display = 'none';
            }
        }

        function displayTemplateSources(sources) {
            const el = document.getElementById('template-sources');
            const list = document.getElementById('template-sources-list');
            if (!sources.length) { el.style.display = 'none'; return; }
            el.querySelector('summary').textContent = `Referenced from ${sources.length} real masters plans`;
            list.innerHTML = sources.map(s => `<li>${escapeHtml(s)}</li>`).join('');
            el.style.display = '';
        }

        // Split set text into bullet items on "N ×" boundaries (e.g. "4 × 50 Free...")
        function formatSet(text) {
            if (!text) return '';
            // Split before patterns like "4 × 75" or "2 × 100" (digit + × + digit)
            const parts = text.split(/(?=\b\d+\s*[\u00d7x]\s+\d)/);
            const items = parts.map(p => p.trim()).filter(p => p);
            if (items.length <= 1) {
                return `<span class="set-text">${escapeHtml(text)}</span>`;
            }
            return `<ul class="set-items">${items.map(p => `<li>${escapeHtml(p)}</li>`).join('')}</ul>`;
        }

        function getTypeBadgeClass(type) {
            if (!type) return 'type-default';
            const t = type.toLowerCase();
            if (t.includes('mileage') || t.includes('endurance')) return 'type-mileage';
            if (t.includes('speed') || t.includes('fast'))        return 'type-speed';
            if (t === 'im' || t.includes(' im'))                   return 'type-im';
            if (t.includes('threshold') || t.includes('css'))      return 'type-threshold';
            if (t.includes('technique') || t.includes('drill'))    return 'type-technique';
            return 'type-default';
        }

        function displaySessions(sessions) {
            const container = document.getElementById('swim-plan-sessions');

            // Group by week, preserving order
            const weekMap = {};
            const weekOrder = [];
            sessions.forEach(s => {
                const w = String(s.week);
                if (!weekMap[w]) { weekMap[w] = []; weekOrder.push(w); }
                weekMap[w].push(s);
            });

            let html = '<div class="sessions-list">';
            weekOrder.forEach(week => {
                html += `<div class="week-heading">Week ${escapeHtml(week)}</div>`;
                weekMap[week].forEach(s => {
                    const badgeClass = getTypeBadgeClass(s.session_type);
                    html += `
                        <div class="session-card">
                            <div class="session-header">
                                <span class="session-title">Session ${escapeHtml(String(s.session))}</span>
                                ${s.session_type ? `<span class="type-badge ${badgeClass}">${escapeHtml(s.session_type)}</span>` : ''}
                                ${s.total_distance_m ? `<span class="session-distance">${escapeHtml(String(s.total_distance_m))}m</span>` : ''}
                            </div>
                            <div class="session-body">
                                <div class="set-section">
                                    <div class="set-label">Warm Up</div>
                                    ${formatSet(s.warm_up)}
                                </div>
                                <div class="set-section">
                                    <div class="set-label">Build Set</div>
                                    ${formatSet(s.build_set)}
                                </div>
                                <div class="set-section">
                                    <div class="set-label">Main Set</div>
                                    ${formatSet(s.main_set)}
                                </div>
                                <div class="set-section">
                                    <div class="set-label">Cool Down</div>
                                    ${formatSet(s.cool_down)}
                                </div>
                            </div>
                        </div>`;
                });
            });
            html += '</div>';
            container.innerHTML = html;
        }
    </script>
</body>
</html>
